name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          ruby -e '
            require "yaml"
            %w[
              repository.yaml
              picoclaw/build.yaml
              picoclaw/config.yaml
              picoclaw/translations/en.yaml
            ].each do |path|
              YAML.load_file(path, permitted_classes: [], aliases: false)
            end
          '

      - name: Validate example JSON
        run: jq -e 'type == "object"' picoclaw/examples/raw_json_config.example.json

      - name: Validate shell syntax
        run: bash -n picoclaw/run.sh scripts/set-version.sh

      - name: Check version consistency
        run: |
          wrapper_build="$(sed -n 's/^  PICOCLAW_WRAPPER_VERSION: //p' picoclaw/build.yaml)"
          wrapper_config="$(sed -n 's/^version: //p' picoclaw/config.yaml)"
          wrapper_docker="$(sed -n 's/^ARG PICOCLAW_WRAPPER_VERSION=//p' picoclaw/Dockerfile)"

          upstream_build="$(sed -n 's/^  PICOCLAW_VERSION: //p' picoclaw/build.yaml)"
          upstream_docker="$(sed -n 's/^ARG PICOCLAW_VERSION=//p' picoclaw/Dockerfile)"

          echo "Wrapper: build.yaml=${wrapper_build} config.yaml=${wrapper_config} Dockerfile=${wrapper_docker}"
          echo "Upstream: build.yaml=${upstream_build} Dockerfile=${upstream_docker}"

          ok=true
          if [ "${wrapper_build}" != "${wrapper_config}" ]; then
            echo "::error::Wrapper version mismatch: build.yaml (${wrapper_build}) != config.yaml (${wrapper_config})"
            ok=false
          fi
          if [ "${wrapper_build}" != "${wrapper_docker}" ]; then
            echo "::error::Wrapper version mismatch: build.yaml (${wrapper_build}) != Dockerfile (${wrapper_docker})"
            ok=false
          fi
          if [ "${upstream_build}" != "${upstream_docker}" ]; then
            echo "::error::Upstream version mismatch: build.yaml (${upstream_build}) != Dockerfile (${upstream_docker})"
            ok=false
          fi

          [ "${ok}" = true ]
